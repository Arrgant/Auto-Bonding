version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: auto-bonding-backend
    restart: unless-stopped
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000
      - FILE_RETENTION_SECONDS=3600
      - LOG_LEVEL=INFO
      - MAX_UPLOAD_SIZE=50
    volumes:
      - temp_files:/tmp/auto-bonding
    networks:
      - auto-bonding-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: auto-bonding-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auto-bonding-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

# 网络
networks:
  auto-bonding-network:
    driver: bridge

# 卷
volumes:
  temp_files:
    driver: local
